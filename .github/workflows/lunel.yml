name: lunel

on:
  push:
    branches: [master]
    paths:
      - "lunel/**"
      - ".github/workflows/lunel.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: lunel
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/nuln/lunel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Manager starts
        run: |
          docker run -d --name lunel-ci-test \
            -e PORT=8899 \
            -e MANAGER_ADMIN_PASSWORD=ci-test \
            ghcr.io/nuln/lunel:latest \
            lunel-manager
          sleep 3
          OUTPUT=$(docker exec lunel-ci-test bun -e "
            const r = await fetch('http://localhost:8899/health');
            console.log(await r.text());
          ")
          docker rm -f lunel-ci-test
          echo "Manager health: $OUTPUT"
          echo "$OUTPUT" | grep -q '"status":"ok"' && echo "✅ Manager verified" || exit 1
