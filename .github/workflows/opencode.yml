name: opencode

# Only build when the opencode/ subdirectory (or this workflow file) changes.
on:
  push:
    branches: [master]
    paths:
      - "opencode/**"
      - ".github/workflows/opencode.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Specify the OpenCode version (leave empty to auto-use npm latest)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1) Determine the OpenCode version: explicit input takes priority, otherwise use npm latest
      #    This version is used both as the Dockerfile OPENCODE_VERSION build-arg and the image tag
      - name: Determine OpenCode version to install
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(npm view opencode-ai version 2>/dev/null)
          fi
          if [ -z "$VERSION" ]; then
            echo "Failed to fetch opencode-ai version" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Installing OpenCode version: ${VERSION}"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: opencode
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            OPENCODE_VERSION=${{ steps.ver.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/nuln/opencode:latest
            ghcr.io/nuln/opencode:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) Verify: pull the just-pushed image and confirm the in-image `opencode --version` matches the tag
      #    (amd64 is enough to verify the version number, avoiding re-pulling all platforms)
      - name: Verify image opencode version matches tag
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Pull only the amd64 architecture for verification (faster)
          docker pull --platform linux/amd64 "ghcr.io/nuln/opencode:${VERSION}"
          IMG_VER=$(docker run --rm --platform linux/amd64 "ghcr.io/nuln/opencode:${VERSION}" opencode --version 2>/dev/null | head -1)
          echo "In-image opencode version: ${IMG_VER}"
          echo "Expected tag version:     ${VERSION}"
          # Normalize the comparison (ignore surrounding whitespace / leading v)
          IMG_VER_N=$(echo "$IMG_VER" | tr -d '[:space:]' | sed 's/^v//')
          VER_N=$(echo "$VERSION" | tr -d '[:space:]' | sed 's/^v//')
          if [ "$IMG_VER_N" != "$VER_N" ]; then
            echo "Version mismatch! in-image=${IMG_VER} tag=${VERSION}" >&2
            exit 1
          fi
          echo "✅ In-image OpenCode version matches tag version (${VERSION})"

