name: icloud

# Only build when the icloud/ subdirectory (or this workflow file) changes.
on:
  push:
    branches: [master]
    paths:
      - "icloud/**"
      - ".github/workflows/icloud.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1) Use the upstream mandarons/icloud-docker latest version as the base image + image tag
      #    (the icloud-docker image name is the version, kept in sync with mandarons)
      - name: Determine upstream version
        id: ver
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/mandarons/icloud-docker/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to fetch icloud-docker version" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building iCloud version: ${VERSION}"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: icloud
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          # Pin the FROM base image to the upstream version for reproducibility
          build-args: |
            ICD_VERSION=${{ steps.ver.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/nuln/icloud:latest
            ghcr.io/nuln/icloud:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) Verify: pull the just-pushed image and confirm the version label matches the tag
      #    (amd64 is enough to verify the version number, avoiding re-pulling all platforms)
      - name: Verify image version label matches tag
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          docker pull --platform linux/amd64 "ghcr.io/nuln/icloud:${VERSION}"
          IMG_VER=$(docker inspect --format='{{ index .Config.Labels "org.opencontainers.image.version" }}' "ghcr.io/nuln/icloud:${VERSION}" 2>/dev/null | sed 's/^v//')
          echo "Image version label: ${IMG_VER}"
          echo "Expected tag version: ${VERSION}"
          IMG_VER_N=$(echo "$IMG_VER" | tr -d '[:space:]' | sed 's/^v//')
          VER_N=$(echo "$VERSION" | tr -d '[:space:]' | sed 's/^v//')
          if [ "$IMG_VER_N" != "$VER_N" ]; then
            echo "Version mismatch! label=${IMG_VER} tag=${VERSION}" >&2
            exit 1
          fi
          echo "✅ Image version label matches tag version (${VERSION})"

