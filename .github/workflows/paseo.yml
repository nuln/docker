name: paseo

on:
  push:
    branches: [master]
    paths:
      - "paseo/**"
      - ".github/workflows/paseo.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Specify Paseo version (leave empty to auto-use latest GitHub release)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Paseo version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -fsSL https://api.github.com/repos/getpaseo/paseo/releases/latest \
              | jq -r '.tag_name' | sed 's/^v//')
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to fetch paseo version" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Paseo version: ${VERSION}"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: paseo
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            PASEO_VERSION=${{ steps.ver.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/nuln/paseo:latest
            ghcr.io/nuln/paseo:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image builds and starts
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          docker pull --platform linux/amd64 "ghcr.io/nuln/paseo:${VERSION}"
          # Verify the in-image install.sh is present and executable
          docker run --rm --platform linux/amd64 "ghcr.io/nuln/paseo:${VERSION}" \
            bash -c "test -x /usr/local/bin/install.sh && echo 'install.sh OK' || exit 1"
          echo "✅ Paseo image ${VERSION} verified"
